- title: "Hopscotch: Discovering and Skipping Redundancies in Language Models"
  speaker: "Mustafa Eyceoz"
  youtube_id: "1PGHYKqrE94"
  youtube_url: "https://www.youtube.com/live/1PGHYKqrE94?si=OkjefuYN7hK76NWU"
  embed_url: "https://www.youtube.com/embed/1PGHYKqrE94?si=OkjefuYN7hK76NWU"
  date: "2025-08-08"
  category: "Random Samples"
  abstract: "Join us for a presentation and discussion on Hopscotch, a method produced by Red Hat's AI Innovation team aimed at understanding and reducing redundancy in language models. With Hopscotch, we can skip entire attention blocks within a model, offering improved inference speeds and memory savings with minimal quality drop-off. This coarse-grained method also provides insights into the frequency of task-specific redundancies within language models, and just how inefficient large models may be today."

- title: "Grounding Feedback is All You Need: Aligning Small Vision-Language Models"
  speaker: "Giorgio Giannone"
  youtube_id: "ddnRm-OHm1k"
  youtube_url: "https://www.youtube.com/watch?v=ddnRm-OHm1k"
  embed_url: "https://www.youtube.com/embed/ddnRm-OHm1k?si=VN4JLkyEEXaawE0c"
  date: "2025-07-18"
  category: "Random Samples"
  abstract: "While recent vision-language models (VLMs) excel at integrating visual and linguistic information, their performance hinges on vast quantities of curated image-text pairs. This reliance makes the alignment process both time-consuming and resource-intensive. In this talk, I will introduce Sampling-based Vision Projection (SVP), a novel framework that improves vision-language alignment using automated feedback and minimal human supervision. Our results show that SVP significantly enhances image captioning, improves object recall, and reduces hallucination, enabling smaller models to match the performance of much larger systems."

- title: "On scalable RL in the era of agentic LLMs"
  speaker: "Aldo Pareja"
  youtube_id: "qenmyHH87es"
  youtube_url: "https://www.youtube.com/watch?v=qenmyHH87es"
  embed_url: "https://www.youtube.com/embed/qenmyHH87es?si=iOoAhJfK5Ktux6T8"
  date: "2025-07-11"
  category: "Random Samples"
  abstract: "As AI progresses beyond individual models toward tool-using, multi-agent systems, a new frontier is emerging, one where language models act over time, coordinate, and interface with real-world environments. These agentic systems promise to automate complex tasks, but realizing their full potential will require more than just scale. This talk will focus on the broader challenge of optimizing interactive AI behaviors, and the limitations of conventional supervised fine-tuning in such settings. I will introduce async-grpo, a novel high-performance reinforcement learning library purpose-built for training language models."

- title: "LLM Meets Cache: From Application to Architecture"
  speaker: "Shuhang Lin"
  youtube_id: "7bpANF68hNE"
  youtube_url: "https://www.youtube.com/watch?v=7bpANF68hNE"
  embed_url: "https://www.youtube.com/embed/7bpANF68hNE?si=_62Vqz5gHt5VI_z4"
  date: "2025-06-27"
  category: "Random Samples"
  abstract: "Large Language Models are powerful yet resource-intensive systems that excel across numerous domains, including autonomous agents, complex reasoning, and content generation. However, their computational demands present significant challenges for practical deployment and scalability. Caching serves as a critical optimization strategy for reusing computational results and reducing redundant processing. In this presentation, we will explore cache design from two key perspectives: application-layer agent caching for efficient retrieval and response generation, and model-layer architectural caching including quantized KV cache implementations for memory efficiency."

- title: "Accelerating LLM Knowledge Learning and Unlearning Research via Unified Frameworks"
  speaker: "Wenlong Zhao"
  youtube_id: "Rzq3Cs_fpoI"
  youtube_url: "https://www.youtube.com/watch?v=Rzq3Cs_fpoI"
  embed_url: "https://www.youtube.com/embed/Rzq3Cs_fpoI?si=tgmfWOLh0j3dDjXF"
  date: "2025-06-13"
  category: "Random Samples"
  abstract: "General purpose LLMs may struggle to answer knowledge-intensive questions grounded in specialized document collections. The first part of the presentation will discuss recent literature of injecting specialized knowledge into LLM parameters and propose an extensible framework for knowledge acquisition methods. The second part will cover OpenUnlearning, an extensible framework designed to benchmark both unlearning methods and evaluation metrics for LLMs, integrating 9 unlearning algorithms, 16 evaluation methods, and 450+ model checkpoints."

