- title: "State of LLM Compression from Research to Production"
  speaker: "Mark Kurtz"
  youtube_id: "T8XDkZuv7O4"
  youtube_url: "https://www.youtube.com/watch?v=T8XDkZuv7O4"
  embed_url: "https://www.youtube.com/embed/T8XDkZuv7O4?si=_AZVC_fy5t0d4bOr"
  date: "2025-04-18"
  category: "Random Samples"
  abstract: "LLMs have owned the stage, but with size comes complexity. This talk explores the evolving landscape of LLM Compression, from the latest SOTA research to real-world deployments. We'll break down the high-level effects of techniques such as quantization and sparsity and their tradeoffs between accuracy and performance. Additionally, we'll walk through the differences between academic and real-world benchmarks, what's ready for production today, what's sitting in the research lab, and what it will take to close the gap."

