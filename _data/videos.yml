- title: "Instance-Adaptive Inference-Time Scaling with Calibrated Process Reward Models"
  speaker: "Young Jin Park"
  youtube_id: "vLA0XLunuik"
  youtube_url: "https://www.youtube.com/live/vLA0XLunuik"
  embed_url: "https://www.youtube.com/embed/vLA0XLunuik"
  date: "2025-10-03"
  category: "Random Samples"
  abstract: "Process reward models (PRMs) play a central role in guiding inference-time scaling algorithms for LLMs. However, even state-of-the-art PRMs can be poorly calibrated. To address this, we present a calibration approach that adjusts PRM outputs to better align with true success probabilities. We introduce an instance-adaptive scaling framework that dynamically adjusts the inference budget based on the estimated likelihood that a partial reasoning trajectory will yield a correct final answer. Experiments on math reasoning benchmarks show that (i) our PRM calibration method achieves small calibration error, outperforming the baseline methods, (ii) calibration is crucial for enabling effective adaptive scaling, and (iii) the proposed IAS strategy reduces inference costs while maintaining final accuracy."

- title: "Activation-Informed Merging of Large Language Models"
  speaker: "Amin Heyrani Nobari & Kaveh Alim"
  drive_file_id: "12zhCmJRC2QjB8NhsxmP6T2xVvBsnI7JB"
  youtube_id: "lHDrnDWZk5k"
  youtube_url: "https://www.youtube.com/watch?v=lHDrnDWZk5k"
  date: "2025-04-11"
  category: "Random Samples"
  abstract: "Join us for a talk on merging LLM experts, combining the parameters and embeddings of multiple fine-tuned LLMs to enhance performance across various tasks while maintaining computational efficiency. We introduce Activation-Informed Merging (AIM), a technique that integrates activation space information into the merging process to improve performance and robustness of merging methods. AIM is a flexible, complementary solution applicable to any existing merging method, motivated by continual learning and model compression principles, it is designed to preserve salient weights from pre-training to enhance merging outcomes with empirical evidence showing up to a 40% increase in benchmark performance."

