- title: "Towards Combinatorial Interpretability of Neural Computation"
  speaker: "Nir Shavit"
  youtube_id: "6LYnnCF06Y4"
  youtube_url: "https://www.youtube.com/watch?v=6LYnnCF06Y4"
  embed_url: "https://www.youtube.com/embed/6LYnnCF06Y4?si=Z5l0Bak4Nx6ffDnG"
  date: "2025-05-09"
  category: "Random Samples"
  abstract: "This session will introduce a groundbreaking combinatorial approach to neural network interpretability, based on research from Nir Shavit and Micah Adler at MIT CSAIL, and Dan Alistarh at IST Austria. The approach focuses on the relationships within the network's learned weights and biases, offering a new way to decode how neural networks compute logic. We'll explore the Feature Channel Coding Hypothesis, which reveals how neural networks compute Boolean expressions by mapping input features to combinations of neurons, effectively forming codes for each feature."

- title: "Synthetic Data Generation via SDG-Hub"
  speaker: "Abhishek Bhandwaldar, Shivchander Sudalairaj, Akash Srivastava"
  youtube_id: "aGKCViWjAmA"
  youtube_url: "https://www.youtube.com/watch?v=aGKCViWjAmA"
  embed_url: "https://www.youtube.com/embed/aGKCViWjAmA?si=fymOzWq9bwDksJuT"
  date: "2025-05-02"
  category: "Random Samples"
  abstract: "In this talk, we will introduce SDG Hub, an open-source toolkit developed at Red Hat for customizing language models using synthetic data. We will begin by unpacking what synthetic data means in the context of LLMs, and how it enables model customization. The session will explore SDG Hub's core components: prompts, blocks, and flows, and demonstrate how users can compose, extend, or modify pipelines to fit specific tasks."

- title: "Continual Post-Training"
  speaker: "Nikhil Nayak, Krishnateja Killamsetty"
  youtube_id: "A5Eg1RZK3oE"
  youtube_url: "https://www.youtube.com/watch?v=A5Eg1RZK3oE"
  embed_url: "https://www.youtube.com/embed/A5Eg1RZK3oE?si=AdhBuX7Q0h1lpqNH"
  date: "2025-04-25"
  category: "Random Samples"
  abstract: "As large language models transition from static systems to dynamic components in real-world applications, a major challenge emerges: how can we teach them new tasks without making them forget what they've already learned? In this talk, we'll introduce a practical and theoretically grounded method for post-training continual learning that enables full-model fine-tuning, without increasing model size or compromising general capabilities. The key insight lies in constraining updates to carefully selected low-rank subspaces."

