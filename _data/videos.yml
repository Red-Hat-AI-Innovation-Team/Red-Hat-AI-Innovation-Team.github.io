- title: "Beyond Binary Rewards: Training LMs to Reason About Their Uncertainty"
  speaker: "Isha Puri"
  drive_file_id: "1BojnxhUW9lL87ZyX_jeozg_Ws-yR6Kx6"
  youtube_id: "F-Zhrt4ej0g"
  youtube_url: "https://www.youtube.com/watch?v=F-Zhrt4ej0g"
  date: "2026-05-15"
  category: "Random Samples"
  abstract: "Reinforcement learning (RL) improves language models' reasoning on difficult QA tasks, but common binary correctness rewards can encourage guessing, harm calibration, and increase hallucinations. We introduce RLCR (Reinforcement Learning with Calibration Rewards), which trains models to output both answers and confidence estimates by adding a Brier-score calibration reward to standard correctness rewards. Results show that existing reasoning training methods can be straightforwardly modified to additionally optimize for calibration, and that this improves in turn their accuracy, robustness, and scalability."

- title: "Agent Factories for High-Level Synthesis"
  speaker: "Abhishek Bhandwaldar, Akash Srivastava"
  drive_file_id: "10Y7oxOyftPaicwZa1KByYfJ2mJhRm-fx"
  youtube_id: "Y32TpjV3ghQ"
  youtube_url: "https://www.youtube.com/watch?v=Y32TpjV3ghQ"
  date: "2026-05-01"
  category: "Random Samples"
  abstract: "We study whether general-purpose AI coding agents, with no hardware-specific training, can optimize chip designs. Our method, HLS Factory, builds and coordinates multiple autonomous agents that iteratively modify code, compile it to hardware circuits, and learn from the results. By scaling the number of agents, we see speedup go up across twelve benchmarks, with the best results on harder problems where agents discover algorithmic restructurings that traditional search methods cannot reach. In our best case, one agent out of ten discovered an algorithmic restructuring that cut latency 11x and area 32x, a design no parameter search or single agent would have found."

- title: "Towards Self-Adapting Models"
  speaker: "Jyo Pari"
  drive_file_id: "11QWeBYAEttwJFjtkC-2r7vmjsU5yU4uQ"
  youtube_id: "_5k29KwWnyM"
  youtube_url: "https://www.youtube.com/watch?v=_5k29KwWnyM"
  date: "2026-04-17"
  category: "Random Samples"
  abstract: "LLMs are powerful but static, lacking the ability to update their weights for new tasks or knowledge. We introduce Self-Adapting LLMs (SEAL), a framework where models generate their own finetuning data and update instructions. Given an input, the model produces a self-edit that may restructure information, set optimization parameters, or use tools for augmentation and training. These edits enable persistent weight updates via supervised finetuning. An RL loop trains the model to create effective self-edits using downstream performance as the reward. Unlike prior methods that rely on external modules, SEAL allows models to control their own adaptation, showing promising results in knowledge integration and few-shot generalization."

- title: "Self-Distillation as a New Framework for Continual Learning"
  speaker: "Idan Shenfeld"
  drive_file_id: "1XmOONJQeUq9mZTXxSnndmkqIn_-EiBq7"
  youtube_id: "kl-j09kJ0xk"
  youtube_url: "https://www.youtube.com/watch?v=kl-j09kJ0xk"
  date: "2026-04-10"
  category: "Random Samples"
  abstract: "Catastrophic forgetting remains a central challenge in continual learning and the practical fine-tuning of large models, yet even basic questions about why different training algorithms forget at different rates remain unclear. In this talk, we present our discovery that when fine-tuning large models on a new task, on-policy learning consistently forgets far less than supervised fine-tuning, even when both methods reach similar performance. Building upon this insight, we present Self-Distillation, a new family of algorithms for LLM fine-tuning. Self-Distillation leverages in-context learning by using a demonstration-conditioned model as its own teacher, generating on-policy training signals that preserve prior capabilities while acquiring new skills."

- title: "Reasoning with Sampling: Your Base Model is Smarter Than You Think"
  speaker: "Aayush Karan"
  drive_file_id: "1CFy1Rs5PEjeMFw5OlNTrJojBljp0Kyg9"
  youtube_id: "di_M8_S-0SQ"
  youtube_url: "https://www.youtube.com/watch?v=di_M8_S-0SQ"
  date: "2026-04-03"
  category: "Random Samples"
  abstract: "Frontier reasoning models have exhibited incredible capabilities across a wide array of disciplines, driven by posttraining large language models with reinforcement learning. However, despite the widespread success of this paradigm, much of the literature has been devoted to disentangling truly novel behaviors that emerge during RL but are not present in the base models. In our work, we approach this question from a different angle, instead asking whether comparable reasoning capabilities can be elicited from base models at inference time by pure sampling, without any additional training. Inspired by Markov chain Monte Carlo (MCMC) techniques for sampling from sharpened distributions, we propose a simple iterative sampling algorithm leveraging the base models' own likelihoods. Over different base models, we show that our algorithm offers substantial boosts in reasoning that nearly match and even outperform those from RL on a wide variety of single-shot tasks, including MATH500, HumanEval, and GPQA."

- title: "Advancing Real-World Long-Horizon Tool-Using LLM Agents"
  speaker: "Zhenting Wang"
  drive_file_id: "1ZzmL-De_Gnc70Fn7qj3goG5ndRyDypra"
  youtube_id: "OHWpr0vzneQ"
  youtube_url: "https://www.youtube.com/watch?v=OHWpr0vzneQ"
  date: "2026-03-27"
  category: "Random Samples"
  abstract: "Recent progress in LLM agents has made tool use practical, but two challenges remain: evaluating agents in realistic environments and scaling them to long-horizon tasks with finite context. This presentation highlights two recent works that address these issues. MCP-Bench provides a realistic evaluation framework using 28 live MCP servers and 250 tools, testing schema understanding, multi-step planning, grounding, and cross-domain orchestration, and exposing major weaknesses in current frontier models. Meme(RL) introduces an indexed memory framework that keeps a compact summary in context while storing full past interactions externally for retrieval. Trained with reinforcement learning, it helps agents retain critical evidence, improve long-horizon performance, and reduce context usage."

- title: "Nondeterminism in LLM Inference & Training-Rollout Mismatch"
  speaker: "Xinheng Ding"
  drive_file_id: "1V9tz2LyqzxiwWd0dYDM0mVEnc_lpN5VE"
  youtube_id: "2BJaMRtIi4I"
  youtube_url: "https://www.youtube.com/watch?v=2BJaMRtIi4I"
  date: "2026-03-20"
  category: "Random Samples"
  abstract: "LLM generation is not deterministic even when the temperature is set to zero. This issue is more pronounced in RL, where the training and rollout engines naturally operate with different batch sizes, kernel selections, and parallelization strategies. This training-rollout mismatch problem leads to suboptimal performance and training collapse, especially for MoE models. In this talk, we analyze why this happens and how to solve the problem from the system level by building deterministic GPU kernels."

- title: "Evolutionary Arms Races Between LLMs in Core War"
  speaker: "Akarsh Kumar"
  drive_file_id: "1PXeJHvrHC9S9xRfFq4K4asC0_3pSkPYy"
  youtube_id: "ysmo0m1ZAmw"
  youtube_url: "https://www.youtube.com/watch?v=ysmo0m1ZAmw"
  date: "2026-03-13"
  category: "Random Samples"
  abstract: "Large language models are increasingly being used to evolve solutions to problems, inspired by biological evolution. Unlike biology, most LLM-evolution frameworks are static optimization problems, overlooking the open-ended adversarial dynamics of real-world evolutionary processes. Here, we study Digital Red Queen (DRQ), a simple self-play algorithm that embraces these Red Queen dynamics via continual adaptation to a changing objective. DRQ uses an LLM to evolve assembly-like programs, called warriors, which compete for control of a virtual machine in Core War, a Turing-complete environment studied in artificial life and connected to cybersecurity. Over many rounds, we observe that warriors become increasingly general. Interestingly, warriors also become less behaviorally diverse across independent runs, indicating a convergence pressure toward a general-purpose behavioral strategy, much like convergent evolution in nature."

- title: "Agentic Context Engineering: Evolving Contexts for Self-Improving Language Models"
  speaker: "Qizheng Zhang"
  drive_file_id: "1mekX2EqiLGt2OSKqT5fWwV2KdsJgUY_x"
  youtube_id: "A3RKCKemnSg"
  youtube_url: "https://www.youtube.com/watch?v=A3RKCKemnSg"
  date: "2026-03-06"
  category: "Random Samples"
  abstract: "This talk presents Agentic Context Engineering (ACE), an upcoming CLR 2026 paper. ACE reframes context adaptation as a new medium of continual learning without weight updates, where agents evolve their own playbooks over time. Instead of repeatedly rewriting prompts or memories, which often leads to context collapse, ACE uses a structured generate-reflect-curate loop to incrementally accumulate, refine, and organize strategies based on agent execution feedback. This enables self-evolving agents that improve online, even without labeled supervision, while remaining efficient and stable under long contexts."

- title: "Few-Shot Diffusion Language Models"
  speaker: "Tunyu Zhang"
  drive_file_id: "1clxtxBIr7MPMdd6IlB77W_PDTrX1wdji"
  youtube_id: "SFRcD-JMko4"
  youtube_url: "https://www.youtube.com/watch?v=SFRcD-JMko4"
  date: "2026-02-27"
  category: "Random Samples"
  abstract: "Diffusion large language models (DLLMs) can generate text quickly by predicting many tokens at once. However, they usually need many refinement steps to produce high-quality results, which reduces their speed advantage. In this talk, we introduce T3D, a framework that helps DLLMs work well with only a few steps. It is based on two main ideas: (1) trajectory self-distillation, where a smaller model learns directly from the full step-by-step outputs of a stronger teacher model, reducing the mismatch between training and actual use, and (2) direct discriminative optimization, a training method that pushes the model to choose clearer, more confident predictions. T3D outperforms other few-step methods on reasoning and code generation tasks, significantly closing the gap with full-step diffusion models."

- title: "Instance-Adaptive Inference-Time Scaling with Calibrated Process Reward Models"
  speaker: "Young Jin Park"
  youtube_id: "vLA0XLunuik"
  youtube_url: "https://www.youtube.com/live/vLA0XLunuik"
  embed_url: "https://www.youtube.com/embed/vLA0XLunuik"
  date: "2025-10-03"
  category: "Random Samples"
  abstract: "Process reward models (PRMs) play a central role in guiding inference-time scaling algorithms for LLMs. However, even state-of-the-art PRMs can be poorly calibrated. To address this, we present a calibration approach that adjusts PRM outputs to better align with true success probabilities. We introduce an instance-adaptive scaling framework that dynamically adjusts the inference budget based on the estimated likelihood that a partial reasoning trajectory will yield a correct final answer. Experiments on math reasoning benchmarks show that (i) our PRM calibration method achieves small calibration error, outperforming the baseline methods, (ii) calibration is crucial for enabling effective adaptive scaling, and (iii) the proposed IAS strategy reduces inference costs while maintaining final accuracy."

- title: "Activation-Informed Merging of Large Language Models"
  speaker: "Amin Heyrani Nobari & Kaveh Alim"
  drive_file_id: "12zhCmJRC2QjB8NhsxmP6T2xVvBsnI7JB"
  youtube_id: "lHDrnDWZk5k"
  youtube_url: "https://www.youtube.com/watch?v=lHDrnDWZk5k"
  date: "2025-04-11"
  category: "Random Samples"
  abstract: "Join us for a talk on merging LLM experts, combining the parameters and embeddings of multiple fine-tuned LLMs to enhance performance across various tasks while maintaining computational efficiency. We introduce Activation-Informed Merging (AIM), a technique that integrates activation space information into the merging process to improve performance and robustness of merging methods. AIM is a flexible, complementary solution applicable to any existing merging method, motivated by continual learning and model compression principles, it is designed to preserve salient weights from pre-training to enhance merging outcomes with empirical evidence showing up to a 40% increase in benchmark performance."

- title: "Scaling Inference Time Scaling: Subspace-orthogonal KV Cache Quantization"
  speaker: "Hao Wang, Ligong Han"
  drive_file_id: "1JkCjne0DsOGiH-g3TJMVw13pbX1ImP7j"
  youtube_id: "D1DjdsxjYrc"
  youtube_url: "https://www.youtube.com/watch?v=D1DjdsxjYrc"
  date: "2025-04-04"
  category: "Random Samples"
  abstract: "Modern reasoning models often require long responses to think through problems before arriving at a final answer. However, this incurs high latency and significant GPU memory demands. We introduce a novel KV cache quantization algorithm: Subspace-orthogonal KV cache quantization (SQuat). Our method is training-free, requires no calibration data, runs on-the-fly, and is grounded in a theoretical framework we developed. Empirically, it reduces GPU peak memory by 2.17x to 2.82x, improves throughput by 2.45x to 3.60x, and outperforms existing training-free KV cache quantization methods."

- title: "Probabilistic Inference Approach to Inference-Time Scaling of LLMs"
  speaker: "Isha Puri"
  drive_file_id: "1BojnxhUW9lL87ZyX_jeozg_Ws-yR6Kx6"
  youtube_id: "cuMfbx3x2no"
  youtube_url: "https://www.youtube.com/watch?v=cuMfbx3x2no"
  date: "2025-02-07"
  category: "Random Samples"
  abstract: "Large language models have achieved significant performance gains via scaling up model sizes and data. However, recent evidence suggests diminishing returns from such approaches, motivating scaling the computation spent at inference time. Existing inference-time scaling methods, usually with reward models, cast the task as a search problem, which tends to be vulnerable to reward hacking. In this paper, we instead cast inference-time scaling as a probabilistic inference task and leverage sampling-based techniques to explore the typical set of the state distribution. We propose a novel inference-time scaling approach by adapting particle-based Monte Carlo methods to this task. Our empirical evaluation demonstrates that our methods have a 4 to 16x better scaling rate over deterministic search counterparts on various challenging mathematical reasoning tasks. Using our approach, Qwen2.5-Math-1.5B-Instruct can surpass GPT-4o accuracy in only 4 rollouts, while Qwen2.5-Math-7B-Instruct scales to o1 level accuracy in only 32 rollouts."

- title: "Practitioner's Guide to Instruction Tuning"
  speaker: "Aldo Pareja"
  drive_file_id: "1vt-ZC2J-hgXh0VnZ0YV0sCnh38AJAc4U"
  youtube_id: "Uk21FWwhK7M"
  youtube_url: "https://www.youtube.com/watch?v=Uk21FWwhK7M"
  date: "2025-01-31"
  category: "Random Samples"
  abstract: "The rise of large language models has created a significant disparity: industrial labs can effectively fine-tune LLMs, while individual developers and small organizations face barriers due to limited resources. We present a comprehensive study on supervised fine-tuning of LLMs using instruction-tuning datasets spanning diverse knowledge domains and skills, focusing on small-sized LLMs (3B to 7B parameters). Key insights include: larger batch sizes paired with lower learning rates lead to improved performance; early-stage training dynamics such as lower gradient norms and higher loss values are strong indicators of better final performance, enabling early termination of sub-optimal runs; certain simplifications in hyperparameters like warmup steps and learning rate schedules do not compromise performance; and no significant difference was observed between phased and stacked training strategies, but stacked training is simpler and more sample efficient."

- title: "Recent Advances in Bayesian Uncertainty Estimation for LLMs"
  speaker: "Haizhou Shi"
  youtube_id: "4zuScUet-y4"
  youtube_url: "https://www.youtube.com/watch?v=4zuScUet-y4"
  date: "2025-01-17"
  category: "Random Samples"
  abstract: "Recent advances in uncertainty estimation for Large Language Models during downstream adaptation have addressed key challenges of reliability and simplicity. However, existing Bayesian methods typically require multiple sampling iterations during inference, creating significant efficiency issues. We investigate eliminating the need for test-time sampling by distilling aligned confidence from a Bayesian LLM into a non-Bayesian student LLM, minimizing the divergence between their predictive distributions. This simple yet effective approach achieves N-times more efficient uncertainty estimation during testing, where N is the number of samples traditionally required. Our extensive experiments demonstrate that uncertainty estimation capabilities on training data can successfully generalize to unseen test data through our distillation technique, consistently producing results comparable to or better than state-of-the-art Bayesian LLMs."

- title: "Scaling Preference Alignment: Overcome Human Data Bottlenecks with Density Ratios from Open-source LLMs"
  speaker: "GX Xu"
  drive_file_id: "1uXV7aCaQsT0MNDNQEiy8E6ch_LVtSWY7"
  youtube_id: "uTieiYJ5RuI"
  youtube_url: "https://www.youtube.com/watch?v=uTieiYJ5RuI"
  date: "2025-01-10"
  category: "Random Samples"
  abstract: "Preference tuning relies on high-quality human preference data, which is often expensive and time-consuming to gather. We introduce DrSow (Density Ratio of Strong over Weak), a cost-effective method that eliminates the reliance on human annotation by leveraging off-the-shelf LLMs for preference data annotation. DrSow uses the log-density ratio between a better-aligned and a less-aligned LLM as a reward signal. We evaluate DrSow across 221 different LLM pairs and empirically find a strong correlation between the performance gap of the paired models and the quality of the reward signal. We also introduce an end-to-end pipeline that customizes reward functions based on user query domains. With a pair of Mistral-7B models, DrSow achieves a RewardBench score of 82.6, outperforming the best trained reward functions from the same model class. Further, we preference-tune Llama-3-8B-Instruct using data annotated by DrSow, pushing it to achieve a 37.4% (+15.1%) win rate on ArenaHard and a 40.7% (+17.8%) win rate on length-controlled AlpacaEval 2.0."

