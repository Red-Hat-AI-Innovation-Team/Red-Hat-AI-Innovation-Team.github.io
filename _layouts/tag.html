---
layout: default
---

<section class="tags">

  <div class="tag__head">
    <div class="container">
      <div class="row">
        <div class="col col-12">
          <h1 class="tag__title">{{ page.title }}</h1>
          <p><a href="{{ site.baseurl }}/tags/">&larr; All tags</a></p>
        </div>
      </div>
    </div>
  </div>

  <div class="tags__inner">
    <div class="container">
      <div class="row">
        <div class="col col-12">
          <div class="row animate">
            {% assign tag_posts = site.tags[page.tag] | sort: 'date' | reverse %}
            {% for post in tag_posts %}
              {% if post.title != null %}
                {% include article.html %}
              {% endif %}
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>

</section>

{% include section-subscribe.html %}
